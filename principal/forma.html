<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Motos - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="codigos.css">
</head>
<body>

    <div class="login-container">
        <h2>🏍️ Mundo BAYMAX</h2>

        <form id="loginForm">
            <div class="mb-3">
                <label>Correo electrónico</label>
                <input type="email" id="correo" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Contraseña</label>
                <input type="password" id="password" class="form-control" required>
            </div>

            <a href="motos.html" class="btn btn-primary w-100">
                Ingresar
            </a>
        </form>

        <hr>

        <button id="googleBtn" class="btn btn-danger btn-social">
            Continuar con Google
        </button>

        <button id="facebookBtn" class="btn btn-primary btn-social">
            Continuar con Facebook
        </button>

        <button id="whatsappBtn" class="btn btn-success btn-social">
            Continuar con WhatsApp
        </button>

        <p class="mt-3">
            ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
        </p>
    </div>

    <script src="script.js"></script>

</body>
</html>
