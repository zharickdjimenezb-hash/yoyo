<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mundo Motos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <h2>🏍️ Registro de Usuario</h2>

    <form id="registroForm">
        <div class="mb-3">
            <label>Nombre completo</label>
            <input type="text" id="nombre" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Correo electrónico</label>
            <input type="email" id="correo" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Contraseña</label>
            <input type="password" id="password" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Confirmar contraseña</label>
            <input type="password" id="confirmar" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Registrarse
        </button>
    </form>

    <p class="mt-3">
        ¿Ya tienes cuenta?
        <a href="index.html">Inicia sesión</a>
    </p>
</div>

<script>
document.getElementById("registroForm").addEventListener("submit", function(e){
    e.preventDefault();

    const pass = document.getElementById("password").value;
    const confirmar = document.getElementById("confirmar").value;

    if(pass !== confirmar){
        alert("Las contraseñas no coinciden");
        return;
    }

    alert("🎉 ¡Registro exitoso! Has recibido un descuento del 10% en tu primera compra de motos.");

    window.location.href = "index.html";
});
</script>

</body>
</html>
